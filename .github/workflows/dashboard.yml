name: NYPost QA Dashboard (GitHub Pages, no Jekyll)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (produces dashboard.html)
        env:
          ZAPIER_WEBHOOK_URL: ${{ vars.ZAPIER_WEBHOOK_URL }}
          USER_AGENT: NYPost-QA-OptionB/1.0 (+QA)
          TIMEOUT: '20'
          HEADLINES_LIMIT: '30'
          OFFLINE: 'false'
          DEBUG_DUMPS: 'true'
          WEB_SECTIONS: "news,metro,sports,page-six"
          INCLUDE_LATEST: 'true'
        run: |
          python scraper.py
          mkdir -p docs
          cp -f dashboard.html docs/index.html
          # (optional) if you generate debug files under docs/data-debug-src
          if [ -d docs/data-debug-src ]; then
            mkdir -p docs/data-debug
            cp -rf docs/data-debug-src/* docs/data-debug/
          fi

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
